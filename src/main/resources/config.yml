settings:
  max-warps-per-player: 3
  teleport-delay-seconds: 3
  cancel-teleport-on-move: true
  allow-cross-world: true
  gui-title: "&8Player Warps"
  manage-gui-title: "&8Your Player Warps"
  default-icon: "ENDER_PEARL"

costs:
  enabled: true
  # Costs are item-only. No Vault/economy hook.
  create-warp:
    - material: DIAMOND
      amount: 3
    - material: EXPERIENCE_BOTTLE
      amount: 16

messages:
  prefix: "&#8B5E3C&lPlayerWarps &8» &f"
  no-permission: "&cYou do not have permission."
  player-only: "&cOnly players can use this command."
  reloaded: "&aReloaded config and warps."
  usage-set: "&cUsage: /pwarp set <name>"
  usage-warp: "&cUsage: /pwarp <name>"
  usage-delete: "&cUsage: /pwarp delete <name>"
  usage-rename: "&cUsage: /pwarp rename <oldName> <newName>"
  warp-created: "&aCreated warp &e%warp%&a."
  warp-deleted: "&aDeleted warp &e%warp%&a."
  warp-renamed: "&aRenamed &e%old% &ato &e%new%&a."
  warp-not-found: "&cThat warp does not exist."
  warp-exists: "&cA warp with that name already exists."
  invalid-name: "&cWarp names can only use letters, numbers, underscores, and dashes. Max 16 characters."
  not-owner: "&cYou do not own that warp."
  limit-reached: "&cYou have reached your player warp limit."
  cost-missing: "&cYou need: &e%cost% &cto create a warp."
  cost-taken: "&aCost paid: &e%cost%&a."
  teleport-starting: "&aTeleporting to &e%warp% &ain %seconds%s. Do not move."
  teleport-cancelled: "&cTeleport cancelled."
  teleported: "&aTeleported to &e%warp%&a."
  no-warps: "&cThere are no player warps yet."
