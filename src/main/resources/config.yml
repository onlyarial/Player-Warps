settings:
  max-warps-per-player: 3
  max-warp-name-length: 32
  max-description-lines: 8
  max-description-line-length: 80
  teleport-delay-seconds: 3
  cancel-teleport-on-move: true
  allow-cross-world: true
  default-icon: "ENDER_PEARL"
  feature-confirmation: true

  # Extra commands that open the public Player Warps GUI.
  gui-aliases:
    - warps
    - playerwarps
    - pwarps

# Rename worlds in the GUI lore.
# Example: the real world folder "world_2" will show as "Pod".
world-naming:
  - world: Spawn
  - world_nether: Nether
  - world_the_end: The End
  - world_2: Pod

costs:
  enabled: true
  create-warp:
    - material: DIAMOND
      amount: 3
    - material: EXPERIENCE_BOTTLE
      amount: 16

  # Cost to run /pwarp feature <name>.
  # Admins with playerwarps.admin bypass this cost.
  featured-cost:
    - material: DIAMOND
      amount: 16
    - material: EXPERIENCE_BOTTLE
      amount: 32

