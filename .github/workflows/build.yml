name: Build Player Warps

on:
push:
branches:
- main

pull_request:
branches:
- main

workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Java 21
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '21'

  - name: Make Gradle Executable
    run: chmod +x gradlew

  - name: Build Plugin
    run: ./gradlew build

  - name: Upload Jar
    uses: actions/upload-artifact@v4
    with:
      name: PlayerWarps
      path: build/libs/*.jar
```
